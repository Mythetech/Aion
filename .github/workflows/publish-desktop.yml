# Manual workflow for publishing desktop applications
# Triggered manually via workflow_dispatch

name: Publish Desktop

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: mythetech/workflows/.github/workflows/desktop-publish.yml@main
    with:
      app_name: "Aion"
      project_path: "Aion.Desktop/Aion.Desktop.csproj"
      test_project: "Aion.Test/Aion.Test.csproj"
      entitlements_path: "Aion.Desktop/Aion.entitlements"
      icon_windows: "Aion.Desktop/wwwroot/aion.ico"
      icon_linux: "Aion.Desktop/wwwroot/aion512.png"
      icon_macos: "Aion.Desktop/wwwroot/aion.icns"
      storage_account: "stmythetechglobal"
      storage_container: "preview"
      versioning: "run_number"
    secrets: inherit
