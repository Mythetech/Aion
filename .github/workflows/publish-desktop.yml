# Manual workflow for publishing desktop applications
# Triggered manually via workflow_dispatch

name: Publish Desktop

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: mythetech/workflows/.github/workflows/desktop-publish.yml@main
    with:
      app_name: "Aion"
      project_path: "Aion.Desktop/Aion.Desktop.csproj"
      test_project: "Aion.Test/Aion.Test.csproj"
      entitlements_path: "Aion.Desktop/Aion.entitlements"
      icon_windows: "Aion.Desktop/wwwroot/aion.ico"
      icon_linux: "Aion.Desktop/wwwroot/aion512.png"
      icon_macos: "Aion.Desktop/wwwroot/aion.icns"
      storage_account: "stmythetechglobal"
      storage_container: "preview"
      versioning: "run_number"
    secrets:
      # Windows Signing (org-level)
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      # macOS Signing (org-level)
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      INSTALLER_CERTIFICATE_BASE64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APPLE_USERNAME_ID: ${{ secrets.APPLE_USERNAME_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MACOS_SIGN_APP_IDENTITY: ${{ secrets.MACOS_SIGN_APP_IDENTITY }}
      MACOS_SIGN_INSTALL_IDENTITY: ${{ secrets.MACOS_SIGN_INSTALL_IDENTITY }}
      # App-specific secrets
      APPLE_APP_ID_PASSWORD: ${{ secrets.APPLE_APP_ID_PASSWORD }}
      BLOB_SAS_TOKEN: ${{ secrets.MYTHETECH_GLOBAL_BLOB_SAS_TOKEN }}
